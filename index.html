<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=0">
  <link rel="icon" type="image/svg" href="./imgs/kiwi.png">
  <title>sunish Suresh (Kiwi Basu) - Part Time Coder</title>
</head>
<body>
  <div id="root"></div>
  <script>
    const titles = [
      "Kiwi Basu",
      "@kiwibasu",
      "stupidish_sunish"
    ];

    let titleIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function animateTitle() {
      const current = titles[titleIndex];

      if (!deleting) {
        document.title = current.slice(0, charIndex++);
      } else {
        document.title = current.slice(0, charIndex--);
      }

      if (!deleting && charIndex > current.length) {
        deleting = true;
        setTimeout(animateTitle, 2000);
        return;
      }

      if (deleting && charIndex < 0) {
        deleting = false;
        titleIndex = (titleIndex + 1) % titles.length;
        charIndex = 0;
        setTimeout(animateTitle, 500);
        return;
      }

      setTimeout(animateTitle, deleting ? 75 : 150);
    }

    // Show Kiwi Basu immediately after refresh
    document.title = "Kiwi Basu";

    // Start animation after 2 seconds
    setTimeout(() => {
      animateTitle();
    }, 100);


  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
